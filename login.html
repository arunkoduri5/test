<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Farmer Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding-bottom: 0;">

    <h2 class="title" style="margin-top: -60px;">Farmer Login</h2>

    <div class="form">
        <label>Full Name</label>
        <input id="name" type="text" placeholder="Enter Full Name">

        <label>Mobile Number</label>
        <input id="mobile" type="tel" placeholder="10 Digit Number" maxlength="10">

        <label>Village / Location</label>
        <input id="location" type="text" placeholder="Enter Village Location">

        <button onclick="login()" style="margin-top: 25px;">Secure Login</button>
    </div>

    <!-- Ensure clean external script is included and no inline scripts block it -->
    <script src="js/script.js"></script>
</body>
</html>
