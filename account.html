<!DOCTYPE html>
<html>

<head>
    <title>Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h2 class="title">Account</h2>

    <div class="booking" id="latestBooking"></div>

    <button onclick="logout()">Logout</button>

    <script src="js/script.js"></script>

    <script>

        let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
        let latest = bookings[bookings.length - 1];

        if (latest) {

            document.getElementById("latestBooking").innerHTML = `
<p><b>Latest Booking</b></p>
<p>Machine: ${latest.machine}</p>
<p>Name: ${latest.name}</p>
<p>Mobile: ${latest.mobile}</p>
<p>Date: ${latest.date}</p>
<p>Status: ${latest.status}</p>
`;

        } else {

            document.getElementById("latestBooking").innerText = "No bookings yet.";

        }

    </script>

    <div class="nav">
        <a href="index.html">Vehicles</a>
        <a href="bookings.html">Bookings</a>
        <a href="account.html">Account</a>
    </div>

</body>

</html>
