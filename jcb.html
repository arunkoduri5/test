<!DOCTYPE html>
<html>

<head>

    <title>JCB Booking</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <h2 class="title">JCB Booking</h2>

    <div class="form">

        <label>Work Type</label>

        <select>
            <option>Ground Clearing</option>
            <option>Pipeline Work</option>
            <option>Remove Rocks</option>
        </select>

        <label>Approx Hours</label>

        <input type="text" placeholder="Enter hours">

        <label>Location</label>

        <input type="text" placeholder="Enter location">

        <label>Date</label>

        <input id="date" type="date">

        <button onclick="searchEquipment('jcb')">Search</button>
    </div>
    
    <script src="js/script.js"></script>
</body>

</html>
