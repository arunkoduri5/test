<!DOCTYPE html>
<html>
<head>
    <title>Farm Equipment Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h2 class="title">Farm Equipment</h2>

    <div class="form">
        <label>Equipment Target</label>
        <select>
            <option>Power Tiller</option>
            <option>Seed Drill</option>
            <option>Rotavator</option>
            <option>Cultivator</option>
            <option>Disc Harrow</option>
            <option>Plough</option>
            <option>Paddy Transplanter</option>
            <option>Reaper</option>
            <option>Threshing Machine</option>
        </select>

        <label>Farm Size (Acres)</label>
        <input id="acres" type="number" placeholder="Enter acres">

        <label>Required Date</label>
        <input id="date" type="date">

        <button onclick="searchEquipment('equipment')">Search</button>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
